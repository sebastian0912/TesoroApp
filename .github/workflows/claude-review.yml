name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude review'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run /review-pr on the diff.
            TesoroApp handles tesorería (real money) and Electron IPC + a C# biometric exe.
            Invoke agents:
              - architect (impact on main/preload/renderer surfaces)
              - reviewer (Angular + Electron code)
              - security (IPC isolation, SQLite local DB, exe invocation)
              - tester-electron (coverage gaps)
            Be strict on money-handling functions.
