name: Claude Security Pass

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - 'app.js'
      - 'preload.js'
      - 'electron-db.js'
      - 'src/**'
      - 'package.json'
  workflow_dispatch: {}

jobs:
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Claude security pass
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          prompt: |
            Run /security-pass on the diff for TesoroApp.
            Verify in main/preload: contextIsolation=true, nodeIntegration=false, sandbox=true — block if regressed.
            Verify preload exposes minimal API via contextBridge (no raw ipcRenderer / require).
            For electron-db.js: no PII stored unencrypted.
            For C# exe invocation: args sanitized, absolute path, timeout.
