<mat-card>
  <mat-card-content>
    <div class="tabla">
      <h1 class="title">Tabla de Autorizaciones activas</h1>
      <mat-form-field class="filtro">
        <mat-label>Filter</mat-label>
        <input matInput (keyup)="applyFilter($event)" placeholder="Filter" #input>
      </mat-form-field>
      <img src="icons/cards/excel.png" alt="Exportar a excel" class="exportar" (click)="openDateRangeDialog()" />
      <div class="table-container">
        <table mat-table [dataSource]="dataSource" class="mat-elevation-z8">
          <ng-container matColumnDef="cedulaQuienPide">
            <th mat-header-cell *matHeaderCellDef> Cédula Quien Pide </th>
            <td mat-cell *matCellDef="let element"> {{element.cedulaQuienPide}} </td>
          </ng-container>
          <ng-container matColumnDef="codigo">
            <th mat-header-cell *matHeaderCellDef> Código </th>
            <td mat-cell *matCellDef="let element"> {{element.codigo}} </td>
          </ng-container>
          <ng-container matColumnDef="cuotas">
            <th mat-header-cell *matHeaderCellDef> Cuotas </th>
            <td mat-cell *matCellDef="let element"> {{element.cuotas}} </td>
          </ng-container>
          <ng-container matColumnDef="monto">
            <th mat-header-cell *matHeaderCellDef> Monto </th>
            <td mat-cell *matCellDef="let element"> {{element.monto | number:'1.0-0'}} </td>
          </ng-container>
          <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
          <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
          <tr class="mat-row" *matNoDataRow>
            <td class="mat-cell" colspan="4">No hay datos "{{input.value}}"</td>
          </tr>
        </table>
      </div>
    </div>
  </mat-card-content>
</mat-card>
