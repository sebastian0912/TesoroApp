<mat-card>
  <mat-card-content>
    <!-- HEADER -->
    <div class="page-header">
      <h1 class="title">Listado de Vacantes</h1>
      <span class="spacer"></span>

      <mat-button-toggle-group
        [value]="viewMode"
        (change)="onToggleView($event.value)"
        aria-label="Cambiar vista"
        class="view-toggle">

        <mat-button-toggle value="table">
          <mat-icon>table_chart</mat-icon>
          <span class="toggle-text">Todos</span>
        </mat-button-toggle>

        <mat-button-toggle value="faltantes">
          <mat-icon>warning</mat-icon>
          <span class="toggle-text">Faltantes</span>
        </mat-button-toggle>

        <mat-button-toggle value="completados">
          <mat-icon>check_circle</mat-icon>
          <span class="toggle-text">Completados</span>
        </mat-button-toggle>
      </mat-button-toggle-group>

      <button mat-icon-button [matMenuTriggerFor]="accionesMenu" aria-label="Acciones de vacantes">
        <mat-icon>more_vert</mat-icon>
      </button>

      <mat-menu #accionesMenu="matMenu">
        <button mat-menu-item (click)="openModal()">
          <mat-icon>add</mat-icon>
          <span>Añadir Vacante</span>
        </button>

        <button mat-menu-item (click)="fileInput.click()">
          <mat-icon>upload_file</mat-icon>
          <span>Subir Excel Vacantes</span>
        </button>

        <button mat-menu-item (click)="descargarExcelVacantes($event)">
          <mat-icon>download</mat-icon>
          <span>Descargar Excel Vacantes</span>
        </button>

        <button mat-menu-item (click)="abrirFormularioPreRegistroVacantes()">
          <mat-icon>open_in_new</mat-icon>
          <span>Formulario Pre Registro Vacantes</span>
        </button>
      </mat-menu>

      <input type="file" #fileInput (change)="onFileSelected($event)" hidden />
    </div>

    <!-- MENU POR FILA (1 SOLO) -->
    <mat-menu #rowMenu="matMenu">
      <ng-template matMenuContent let-row="row">
        <button mat-menu-item (click)="openModalEdit(row)">
          <mat-icon>edit</mat-icon>
          <span>Editar</span>
        </button>

        <button mat-menu-item (click)="eliminarVacante(row)" *ngIf="permitido">
          <mat-icon>delete</mat-icon>
          <span>Eliminar</span>
        </button>

        <mat-divider></mat-divider>

        <div class="menu-toggle" (click)="$event.stopPropagation()">
          <mat-slide-toggle
            [checked]="row.activo"
            (change)="setActivo(row, $event.checked)"
            [disabled]="busyActivoIds.has(row.id)">
            {{ row.activo ? 'Activo' : 'Inactivo' }}
          </mat-slide-toggle>
        </div>
      </ng-template>
    </mat-menu>

    <!-- TABLA -->
    <app-standard-filter-table
      [data]="visibleRows"
      [columnDefinitions]="columnDefinitions"
      [isLoading]="loading"
      [tableTitle]="tableTitle"
      [pageSizeOptions]="pageSizeOptions"
      [defaultPageSize]="defaultPageSize">

      <!-- Acciones (porque col.name === 'actions') -->
      <ng-template #actionsTemplate let-row>
        <button
          mat-icon-button
          [matMenuTriggerFor]="rowMenu"
          [matMenuTriggerData]="{ row: row }"
          aria-label="Acciones">
          <mat-icon>more_vert</mat-icon>
        </button>
      </ng-template>

      <!-- Cumplimiento (pill) -->
      <ng-template appCellTemplate="cumpl" let-row>
        <span [ngClass]="cumplClass(row)">{{ cumplimientoPct(row) }}%</span>
      </ng-template>

      <!-- Salario con currency -->
      <ng-template appCellTemplate="salario" let-row>
        {{ row.salario | currency }}
      </ng-template>

    </app-standard-filter-table>
  </mat-card-content>
</mat-card>
