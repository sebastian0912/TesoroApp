    <div class="modal-backdrop" *ngIf="visible" (click)="requestClose()">
      <section class="modal-panel executive-glass" (click)="$event.stopPropagation()">
        <div class="modal-header">
          <div>
            <p class="eyebrow">Nuevo workspace</p>
            <h2>Crear workspace</h2>
          </div>
          <button mat-icon-button type="button" aria-label="Cerrar modal" (click)="requestClose()">
            <mat-icon>close</mat-icon>
          </button>
        </div>

        <p class="modal-text">
          Empieza con un nombre claro para tu equipo o proyecto. Luego lo conectaremos con tableros y miembros.
        </p>

        <form [formGroup]="form" (ngSubmit)="submitted.emit()" class="modal-form">
          <mat-form-field appearance="outline">
            <mat-label>Nombre del workspace</mat-label>
            <input matInput formControlName="name" maxlength="80" placeholder="Ej. Equipo Producto">
          </mat-form-field>

          <mat-form-field appearance="outline">
            <mat-label>Descripcion</mat-label>
            <textarea
              matInput
              formControlName="description"
              rows="4"
              maxlength="280"
              placeholder="Que equipo trabaja aqui o para que servira este espacio"
            ></textarea>
          </mat-form-field>

          <div class="form-meta">
            <span>{{ getControlLength('description') }}/280</span>
            <span>{{ getControlLength('name') }}/80</span>
          </div>

          <p class="form-error" *ngIf="error">{{ error }}</p>

          <div class="modal-actions">
            <button mat-stroked-button type="button" (click)="requestClose()" [disabled]="saving">
              Cancelar
            </button>
            <button mat-raised-button color="primary" type="submit" [disabled]="form.invalid || saving">
              {{ saving ? 'Creando...' : 'Crear workspace' }}
            </button>
          </div>
        </form>
      </section>
    </div>
