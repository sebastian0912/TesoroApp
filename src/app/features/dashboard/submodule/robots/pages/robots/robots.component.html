<!-- =======================
     CARD: HEADER GENERAL
======================== -->
<mat-card>
  <mat-card-content>
    <div style="display:flex; align-items:center; gap:12px;">
      <h2 style="margin:0;">Robots</h2>
      <span style="flex:1 1 auto;"></span>

      <button mat-stroked-button (click)="reloadAll()">
        <mat-icon>refresh</mat-icon>
        Recargar todo
      </button>
    </div>
  </mat-card-content>
</mat-card>

<div style="height:16px;"></div>

<!-- =======================
     CARD: PENDIENTES (RESUMEN)
     (1 fila con encabezados)
======================== -->
<mat-card>
  <mat-card-content>
    <div style="display:flex; align-items:center; gap:12px; margin: 4px 0 12px; flex-wrap: wrap;">
      <div style="display:flex; align-items:center; gap:8px;">
        <mat-icon>pending_actions</mat-icon>
        <strong>Resumen de faltantes (Sin consultar + En progreso)</strong>
      </div>

      <span style="flex:1 1 auto;"></span>

      <button mat-flat-button (click)="loadPendientesResumen()">
        <mat-icon>sync</mat-icon>
        Actualizar resumen
      </button>
    </div>

    <app-standard-filter-table
      [tableTitle]="'Resumen de faltantes'"
      [data]="pendientesResumenRows"
      [columnDefinitions]="pendientesResumenColumns"
      [isLoading]="isLoadingPendientesResumen"
      [defaultPageSize]="20"
      [pageSizeOptions]="[10,20,50,100]">
    </app-standard-filter-table>
  </mat-card-content>
</mat-card>

<div style="height:16px;"></div>

<!-- =======================
     CARD: PENDIENTES POR OFICINA
     (matriz: filas=módulos, columnas=oficinas)
======================== -->
<mat-card>
  <mat-card-content>
    <div style="display:flex; align-items:center; gap:12px; margin: 4px 0 12px; flex-wrap: wrap;">
      <div style="display:flex; align-items:center; gap:8px;">
        <mat-icon>apartment</mat-icon>
        <strong>Faltantes por oficina</strong>
      </div>

      <span style="flex:1 1 auto;"></span>

      <button mat-flat-button (click)="loadPendientesPorOficina()">
        <mat-icon>sync</mat-icon>
        Actualizar por oficina
      </button>
    </div>

    <app-standard-filter-table
      [tableTitle]="'Faltantes por oficina'"
      [data]="pendientesPorOficinaRows"
      [columnDefinitions]="pendientesPorOficinaColumns"
      [isLoading]="isLoadingPendientesPorOficina"
      [defaultPageSize]="20"
      [pageSizeOptions]="[10,20,50,100]">
    </app-standard-filter-table>
  </mat-card-content>
</mat-card>
