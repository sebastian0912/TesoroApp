<mat-card class="container">
  <mat-card-content>
    <div class="tabla">
      <div class="page-header">
        <h1 class="title">Consultar documentación contratación</h1>

        <!-- ✅ Input opcional para pegar cédulas -->
        <mat-form-field class="filtro" appearance="outline">
          <mat-label>Pegar cédulas</mat-label>
          <input
            matInput
            placeholder="Pega aquí una o varias cédulas (enter, coma, espacio...)"
            (paste)="onTablePaste($event)" />
          <mat-hint>También puedes hacer click en la tabla y pegar (Ctrl+V)</mat-hint>
        </mat-form-field>

        <button mat-icon-button [matMenuTriggerFor]="accionesMenu" aria-label="Acciones">
          <mat-icon>more_vert</mat-icon>
        </button>

        <mat-menu #accionesMenu="matMenu">
          <button mat-menu-item (click)="limpiarTabla()">
            <mat-icon>filter_alt_off</mat-icon>
            <span>Limpiar</span>
          </button>

          <button mat-menu-item (click)="descargarZip()">
            <mat-icon>archive</mat-icon>
            <span>Descargar paquetes</span>
          </button>

          <button
            mat-menu-item
            *ngIf="
              user?.rol?.nombre === 'ADMIN' ||
              user?.rol?.nombre === 'GERENCIA' ||
              user?.correo_electronico === 'archivotualianza@gmail.com' ||
              user?.correo_electronico === 'archivotualianza2@gmail.com' ||
              user?.correo_electronico === 'archivotualianza3@gmail.com' ||
              user?.correo_electronico === 'contratacionzipa.ts@gmail.com' ||
              user?.correo_electronico === 'contratacionnorte.ts@gmail.com' ||
              user?.correo_electronico === 'contratacionsuba.ts@gmail.com' ||
              user?.correo_electronico === 'gestionhumanatocancipa1.ts@gmail.com' ||
              user?.correo_electronico === 'seleccionsuba.ts@gmail.com'
            "
            (click)="exportarExcelFaltantes()">
            <mat-icon>table_view</mat-icon>
            <span>Ver faltantes</span>
          </button>
        </mat-menu>
      </div>

      <!-- ✅ CONTENEDOR CAPTURA-PEGADO (click + Ctrl+V) -->
      <div
        class="table-container"
        tabindex="0"
        (paste)="onTablePaste($event)"
        (click)="focusPasteZone($event)"
        aria-label="Pega aquí cédulas para consultar">

        <!-- ✅ TABLA -->
        <app-standard-filter-table
          [data]="checklistRows"
          [columnDefinitions]="checklistColumns"
          [tableTitle]="'Documentación contratación'"
          [isLoading]="isLoadingChecklist"
          [defaultPageSize]="20"
          [pageSizeOptions]="[10, 20, 50, 100]">

          <!-- ✅ render de estados (OK/WARN/MISSING) con click para abrir PDF -->
          <ng-template #estadoTemplate let-row let-col="col">
            @let cell = row?.[col?.name];

            <button
              type="button"
              class="doc-state-btn"
              [class.is-ok]="cell?.state === 'OK'"
              [class.is-warn]="cell?.state === 'WARN'"
              [class.is-bad]="!cell?.state || cell?.state === 'MISSING'"
              [disabled]="!cell?.url || cell?.state === 'MISSING'"
              (click)="openDoc(cell, $event)"
              [matTooltip]="
                cell?.state === 'OK'
                  ? 'Vigente (≤ 15 días)'
                  : cell?.state === 'WARN'
                  ? 'Existe, pero vencido (> 15 días)'
                  : 'No existe'
              "
              matTooltipShowDelay="600"
              aria-label="Estado del documento">

              @if (cell?.state === 'OK') {
                <mat-icon class="doc-state-ico" aria-hidden="true">check</mat-icon>
              } @else if (cell?.state === 'WARN') {
                <mat-icon class="doc-state-ico" aria-hidden="true">warning</mat-icon>
              } @else {
                <mat-icon class="doc-state-ico" aria-hidden="true">close</mat-icon>
              }
            </button>
          </ng-template>

        </app-standard-filter-table>
      </div>
    </div>
  </mat-card-content>
</mat-card>
