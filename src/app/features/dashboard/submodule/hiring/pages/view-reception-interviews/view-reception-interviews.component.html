<mat-card>
  <mat-card-content>
    <div class="page">
      <div class="page-header">
        <div class="left">
          <h2 class="title">{{ title }}</h2>
          <p class="subtitle">Tabla de entrevistas registradas hoy. Descarga por
            rango en Excel.</p>
        </div>

        <div class="right">

          <button mat-flat-button color="primary"
            (click)="openRangeDialogAndExport()">
            <mat-icon>download</mat-icon>
            Descargar Excel (rango)
          </button>
        </div>
      </div>

      <app-standard-filter-table
        [data]="rows"
        [columnDefinitions]="columns"
        [tableTitle]="title"
        [useSwalLoading]="true">

        <!-- Mostrar fecha+hora sin perder type='date' para filtro/sort -->
        <ng-template appCellTemplate="entrevista_fecha_ultima" let-row>
          {{ row.entrevista_fecha_ultima | date:'dd-MM-yyyy HH:mm' }}
        </ng-template>

      </app-standard-filter-table>
    </div>
  </mat-card-content>
</mat-card>
