<div class="search-candidate-container">
  <div class="outline-section">
    <h3 class="section-title centered-title">
      <mat-icon style="vertical-align: middle; color: #ffffff; margin-right: 8px;">person_search</mat-icon>
      Buscar Candidato
    </h3>
    <p style="text-align: center; margin-bottom: 24px; color: #475569; font-size: 0.95rem;">
      Ingrese la cédula del usuario a buscar.
    </p>

    <div class="grid-managerial-entrevista">
      <!-- Input de Cédula -->
      <mat-form-field appearance="outline" class="input-cedula" style="flex: 2 1 300px;">
        <mat-label>Cédula de Ciudadanía</mat-label>
        <input matInput type="text" [(ngModel)]="cedula" placeholder="Ej: 1010101010" (keyup.enter)="buscarCandidato()">
        <button mat-icon-button matSuffix (click)="buscarCandidato()" [disabled]="!cedula" color="primary">
          <mat-icon>search</mat-icon>
        </button>
      </mat-form-field>
    </div>

    <!-- Botonera Principal -->
    <div class="form-actions" style="margin-top: 16px; display: flex; justify-content: center; gap: 12px;">
      <button mat-flat-button color="primary" (click)="buscarCandidato()">
        Buscar
      </button>
      @if (!mostrarObservacion && procesoValido) {
        <button mat-flat-button color="accent" (click)="mostrarCampoObservacion()"
          >
          Reportar Problema
        </button>
      }
    </div>

    <!-- Sección de Observación -->
    @if (mostrarObservacion) {
      <div style="margin-top: 24px; animation: fadeIn 0.3s ease;">
        <mat-form-field appearance="outline" style="width: 100%;">
          <mat-label>Escriba su observación detallada</mat-label>
          <textarea matInput [(ngModel)]="observacion" rows="3" placeholder="Escriba su observación aquí..."></textarea>
        </mat-form-field>
        <div class="form-actions" style="margin-top: 12px; text-align: right;">
          <button mat-flat-button color="primary" (click)="enviarObservacion()">
            Enviar Reporte
          </button>
        </div>
      </div>
    }
  </div>
</div>
