<ng-template mat-tab-label let-active="active" let-disabled="disabled">
  <div class="custom-colored-tab" [class.active]="active" [class.disabled]="disabled">
    Antecedentes Judiciales
  </div>
</ng-template>
<br />

<div class="seccion" [formGroup]="antecedentes">
  <ng-container *ngFor="let fld of fields; let i = index; trackBy: trackByIndex">
    <div class="input-container">
      <mat-form-field appearance="outline" class="example-full-width">
        <mat-label>{{ fld.label }}</mat-label>

        <ng-container [ngSwitch]="fld.type">

          <!-- ===== ESTADO ===== -->
          <ng-container *ngSwitchCase="'estado'">
            <mat-select [formControlName]="controlName(fld)">
              <mat-option *ngFor="let estado of estados" [value]="estado">
                {{ estado }}
              </mat-option>
            </mat-select>

            <!-- Un solo contenedor matSuffix con menú + estado en línea -->
            <div
              matSuffix
              class="acciones-suffix"
              (click)="$event.stopPropagation()"
              aria-label="Acciones del campo">
              <button
                mat-icon-button
                [matMenuTriggerFor]="menu"
                aria-label="Opciones PDF">
                <mat-icon>more_vert</mat-icon>
              </button>

              <mat-icon
                class="estado-icon"
                [style.--estado-color]="estadoColor(antecedentes.get(controlName(fld))?.value)"
                aria-label="Estado del documento">
                {{ estadoIcon(antecedentes.get(controlName(fld))?.value) }}
              </mat-icon>
            </div>
          </ng-container>

          <!-- ===== LISTA ===== -->
          <ng-container *ngSwitchCase="'list'">
            <mat-select [formControlName]="controlName(fld)" [placeholder]="fld.placeholder || ''">
              <mat-option *ngFor="let opt of getOptions(fld)" [value]="opt">
                {{ opt }}
              </mat-option>
            </mat-select>

            <div
              matSuffix
              class="acciones-suffix"
              (click)="$event.stopPropagation()"
              aria-label="Acciones del campo">
              <button
                mat-icon-button
                [matMenuTriggerFor]="menu"
                aria-label="Opciones PDF">
                <mat-icon>more_vert</mat-icon>
              </button>
            </div>
          </ng-container>

          <!-- ===== NÚMERO ===== -->
          <ng-container *ngSwitchCase="'number'">
            <input
              matInput
              type="number"
              [formControlName]="controlName(fld)"
              min="1"
              step="1"
              inputmode="numeric"
              pattern="[0-9]*"
              (keydown)="onlyInteger($event)" />

            <div
              matSuffix
              class="acciones-suffix"
              (click)="$event.stopPropagation()"
              aria-label="Acciones del campo">
              <button
                mat-icon-button
                [matMenuTriggerFor]="menu"
                aria-label="Opciones PDF">
                <mat-icon>more_vert</mat-icon>
              </button>
            </div>
          </ng-container>

        </ng-container>
      </mat-form-field>

      <!-- Menú por campo (referencia local por iteración) -->
      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="verArchivo(fld.key)">Ver PDF</button>
        <button mat-menu-item>
          <label [for]="'fileInput_' + fld.key" style="cursor: pointer; margin-bottom: 0;">
            Subir PDF
            <input
              type="file"
              [id]="'fileInput_' + fld.key"
              style="display: none;"
              (change)="subirArchivo($event, fld.key)"
              accept=".pdf" />
          </label>
        </button>
      </mat-menu>

      <!-- Nombre del archivo + fecha -->
      <small
        *ngIf="$any(uploadedFiles)[fld.key]"
        class="uploaded-file-name"
        [ngClass]="{ 'text-danger': $any(uploadedFiles)[fld.key].fileName === 'Adjuntar documento' }">
        {{ $any(uploadedFiles)[fld.key].fileName }}
        <ng-container *ngIf="$any(uploadedFiles)[fld.key].updatedAtLabel">
          &nbsp;•&nbsp;
          <span class="text-muted">
            Actualizado: {{ $any(uploadedFiles)[fld.key].updatedAtLabel }}
          </span>
        </ng-container>
      </small>

      <!-- Alerta documento antiguo -->
      <div class="doc-warning" *ngIf="isOlderThan(fld.key, 15)">
        <mat-icon class="warn-icon" color="warn">warning</mat-icon>
        <span>El documento tiene más de 15 días.</span>
      </div>
    </div>
  </ng-container>

  <button mat-flat-button (click)="imprimirVerificacionesAplicacion()" class="example-full-width">
    Cargar
  </button>
</div>
