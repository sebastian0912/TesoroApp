<ng-template mat-tab-label let-active="active" let-disabled="disabled">
  <div class="custom-colored-tab" [class.active]="active" [class.disabled]="disabled">
    Antecedentes Judiciales
  </div>
</ng-template>

<br />

<div class="seccion" [formGroup]="antecedentes">
  <ng-container *ngFor="let fld of fields">
    <div class="input-container">
      <mat-form-field appearance="outline" class="example-full-width">
        <mat-label>{{ fld.label }}</mat-label>

        <ng-container [ngSwitch]="fld.type">
          <!-- ESTADO: opciones antecedentesEstados + icono + menú -->
          <ng-container *ngSwitchCase="'estado'">
            <mat-select [formControlName]="fld.control || fld.key">
              <mat-option *ngFor="let estado of antecedentesEstados" [value]="estado">
                {{ estado }}
              </mat-option>
            </mat-select>

            <div matSuffix class="acciones-suffix">
              <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="PDF options"
                (click)="$event.stopPropagation()">
                <mat-icon>more_vert</mat-icon>
              </button>

              <!-- OJO: usamos (fld.control || fld.key) para leer el valor correcto -->
              <mat-icon class="estado-icon"
                [style.--estado-color]="estadoColor(antecedentes.get(fld.control || fld.key)?.value)">
                {{ estadoIcon(antecedentes.get(fld.control || fld.key)?.value) }}
              </mat-icon>

            </div>
          </ng-container>

          <!-- LIST: lista según optionSource + menú -->
          <ng-container *ngSwitchCase="'list'">
            <mat-select [formControlName]="fld.control || fld.key" [placeholder]="fld.placeholder ?? ''">
              <mat-option *ngFor="let opt of getOptions(fld)" [value]="opt">
                {{ opt }}
              </mat-option>
            </mat-select>

            <button mat-icon-button matSuffix [matMenuTriggerFor]="menu" aria-label="PDF options"
              (click)="$event.stopPropagation()">
              <mat-icon>more_vert</mat-icon>
            </button>
          </ng-container>

          <!-- NUMBER: input numérico + menú -->
          <ng-container *ngSwitchCase="'number'">
            <input matInput type="number" [formControlName]="fld.control || fld.key" min="1" step="1"
              inputmode="numeric" pattern="[0-9]*" (keydown)="onlyInteger($event)" />
            <button mat-icon-button matSuffix [matMenuTriggerFor]="menu" aria-label="PDF options"
              (click)="$event.stopPropagation()">
              <mat-icon>more_vert</mat-icon>
            </button>
          </ng-container>
        </ng-container>
      </mat-form-field>

      <!-- Menú por item (para subir/ver PDF en TODOS) -->
      <mat-menu #menu="matMenu">
        <button mat-menu-item (click)="verArchivo(fld.key)">Ver PDF</button>
        <button mat-menu-item>
          <label [for]="'fileInput_' + fld.key" style="cursor: pointer; margin-bottom: 0;">
            Subir PDF
            <input type="file" [id]="'fileInput_' + fld.key" style="display: none;"
              (change)="subirArchivo($event, fld.key)" accept=".pdf" />
          </label>
        </button>
      </mat-menu>

      <!-- Nombre del archivo + fecha -->
      <small *ngIf="uploadedFiles[fld.key]" class="uploaded-file-name"
        [ngClass]="{ 'text-danger': uploadedFiles[fld.key].fileName === 'Adjuntar documento' }">
        {{ uploadedFiles[fld.key].fileName }}
        <ng-container *ngIf="uploadedFiles[fld.key].updatedAtLabel">
          &nbsp;•&nbsp;<span class="text-muted">Actualizado: {{ uploadedFiles[fld.key].updatedAtLabel }}</span>
        </ng-container>
      </small>

      <!-- Alerta: documento > 15 días -->
      <div class="doc-warning" *ngIf="isOlderThan(fld.key, 15)">
        <mat-icon class="warn-icon" color="warn">warning</mat-icon>
        <span>El documento tiene más de 15 días.</span>
      </div>
    </div>
  </ng-container>

  <button mat-flat-button (click)="imprimirVerificacionesAplicacion()" class="example-full-width">
    Cargar
  </button>
</div>
