<!-- Tarjeta para búsqueda de cédula -->
<div class="seleccion">

  <mat-card class="premium-card">
    <mat-card-header class="card-header-premium">
      <div class="header-content">
        <!-- Flecha a la izquierda -->
        <button mat-icon-button class="btn-managerial-icon" style="flex-shrink: 0;" aria-label="Devolver a contratación"
          routerLink="/dashboard/hiring/recruitment-pipeline">
          <mat-icon>arrow_back</mat-icon>
        </button>

        <div class="header-icon-container">
          <mat-icon class="header-icon">file_copy</mat-icon>
        </div>

        <div class="header-text">
          <mat-card-title class="titulo">Documentos para generar o subir</mat-card-title>
          <mat-card-subtitle class="subtitulo"
            style="display: flex; gap: 8px; align-items: center; margin-top: 4px !important;">
            <span style="color: #cbd5e1;">Cédula: <strong
                style="color: #fff; background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 12px; font-weight: 500;">{{
                cedula || '—' }}</strong></span>
            <span style="color: rgba(255,255,255,0.3);">•</span>
            <span style="color: #cbd5e1;">Contratación: <strong
                style="color: #fff; background: rgba(255,255,255,0.15); padding: 2px 8px; border-radius: 12px; font-weight: 500;">{{
                codigoContratacion || '—' }}</strong></span>
          </mat-card-subtitle>
        </div>
      </div>
    </mat-card-header>

    <mat-card-content class="card-content">
      <!-- Contenedor dividido - usando *ngFor -->
      <div class="split-container">
        <!-- Lado izquierdo: Lista de documentos -->
        <div class="left-panel">
          <div *ngFor="let doc of documentos" class="document-item">
            <span>{{ doc.titulo }}</span>
            <button mat-icon-button [matMenuTriggerFor]="menu">
              <mat-icon>more_vert</mat-icon>
            </button>
            <mat-menu #menu="matMenu">
              <button mat-menu-item (click)="verPDF(doc)">
                <mat-icon>visibility</mat-icon>
                <span>Ver PDF</span>
              </button>

              <!-- Botón Subir PDF con input tipo file -->
              <label mat-menu-item>
                <input type="file" hidden (change)="subirArchivo($event, doc.titulo)" accept=".pdf" />
                <mat-icon>cloud_upload</mat-icon>
                <span>Subir PDF</span>
              </label>

              <!-- Botón Generar PDF para otros documentos -->
              <button mat-menu-item (click)="generarPDF(doc.titulo)">
                <mat-icon>download</mat-icon>
                <span>Generar PDF</span>
              </button>
            </mat-menu>
          </div>
          <!-- Botón para cargar PDFs -->
          <button mat-flat-button class="btn-managerial" style="margin-top: 10px; width: 100%;" (click)="cargarpdf()">
            <span class="text">Cargar PDF</span>
            <mat-icon class="arrow">arrow_forward</mat-icon>
          </button>
        </div>

        <!-- Lado derecho: Vista previa del PDF -->
        <div class="right-panel">
          <iframe id="pdfPreview" class="pdf-preview" title="Vista previa PDF"></iframe>
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
