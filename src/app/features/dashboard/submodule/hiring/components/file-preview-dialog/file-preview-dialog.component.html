<h2 mat-dialog-title class="dialog-title">
    {{ data.title }}
</h2>

<mat-dialog-content class="dialog-content">
    @if (data.items.length === 0) {
    <div class="empty-state">
        <mat-icon>folder_open</mat-icon>
        <p>No hay archivos cargados.</p>
    </div>
    } @else {
    <table mat-table [dataSource]="data.items" class="preview-table">
        <!-- Name Column -->
        <ng-container matColumnDef="name">
            <th mat-header-cell *matHeaderCellDef> Archivo </th>
            <td mat-cell *matCellDef="let element"> {{element.name}} </td>
        </ng-container>

        <!-- Status Column -->
        <ng-container matColumnDef="status">
            <th mat-header-cell *matHeaderCellDef> Estado </th>
            <td mat-cell *matCellDef="let element">
                @if (element.valid) {
                <span class="status-chip success">
                    <mat-icon class="tiny-icon">check_circle</mat-icon> OK
                </span>
                } @else {
                <span class="status-chip error" [title]="element.error">
                    <mat-icon class="tiny-icon">error</mat-icon> Error
                </span>
                <div class="error-text-mobile" *ngIf="element.error">{{ element.error }}</div>
                }
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="displayedColumns; sticky: true"></tr>
        <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
    }
</mat-dialog-content>

<mat-dialog-actions align="end">
    <button mat-button (click)="close()">Cerrar</button>
</mat-dialog-actions>
