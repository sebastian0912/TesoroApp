<mat-card>
  <mat-card-content>
    <form [formGroup]="myForm" (ngSubmit)="onSubmit()">
      <h1 class="titulo">
        Digite el número de identificación del empleado a validar:
      </h1>

      <ng-container>
        <div class="encabezado">
          <mat-form-field class="example-full-width cedula">
            <mat-label>Número de identificación</mat-label>
            <input matInput formControlName="cedula" />
            <mat-error *ngIf="myForm.get('cedula')?.hasError('required')">
              El número de identificación es requerido
            </mat-error>
          </mat-form-field>
          <h1 class="nombre">
            <strong> Nombre Operario : </strong> {{ nombreOperario }}
          </h1>
        </div>
      </ng-container>

      <ng-container>
        <mat-form-field class="example-full-width">
          <mat-label>Valor</mat-label>
          <input
            matInput
            formControlName="valor"
            (input)="formatCurrency($event)"
          />
          <mat-error *ngIf="myForm.get('valor')?.hasError('required')">
            El valor es requerido
          </mat-error>
        </mat-form-field>

        <mat-form-field class="example-full-width">
          <mat-label>Número de cuotas</mat-label>
          <input matInput formControlName="cuotas" type="number" />
          <mat-error *ngIf="myForm.get('cuotas')?.hasError('max')">
            El número de cuotas no puede ser mayor a 4
          </mat-error>
          <mat-error *ngIf="myForm.get('cuotas')?.hasError('min')">
            El número de cuotas no puede ser menor a 1
          </mat-error>
        </mat-form-field>

        <button
          mat-flat-button
          type="submit"
          class="boton"
          [disabled]="myForm.invalid"
        >
          Cargar
        </button>
      </ng-container>
    </form>
  </mat-card-content>
</mat-card>
