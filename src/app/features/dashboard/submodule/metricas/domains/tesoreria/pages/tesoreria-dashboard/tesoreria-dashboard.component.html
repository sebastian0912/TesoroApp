<div class="tesoreria-dashboard-layout">
    <!-- Bar de Filtros Principal -->
    <app-metricas-filters-bar (rangeChanged)="onRangeChanged($event)">
    </app-metricas-filters-bar>

    <!-- KPI Strip (Resumenes numĂ©ricos importantes) -->
    <app-kpi-strip [kpis]="store.kpiSummary$ | async"></app-kpi-strip>

    <div class="dashboard-grid">
        <!-- Primera Fila: Transacciones -->
        <div class="grid-col span-8 span-lg-8">
            <app-chart-card title="Ejecutado vs Pendiente por Ejecutar"
                subtitle="Dinero real desembolsado vs autorizado sin ejecutar"
                [loading]="!(store.transacciones$ | async)">
                <app-tx-timeseries-chart [rawTransactions]="store.transacciones$ | async">
                </app-tx-timeseries-chart>
            </app-chart-card>
        </div>

        <div class="grid-col span-4 span-lg-4">
            <app-chart-card title="Embudo Transaccional" subtitle="Cantidad de Tx por Estados"
                [loading]="!(store.transacciones$ | async)">
                <app-tx-funnel-chart [data]="store.funnelChartData$ | async">
                </app-tx-funnel-chart>
            </app-chart-card>
        </div>

        <!-- Segunda Fila: Quien mas compra + Ranking autorizadores -->
        <div class="grid-col span-6 span-lg-6">
            <app-chart-card title="Top Compradores"
                subtitle="Personas con mas transacciones ejecutadas"
                [loading]="!(store.topCompradores$ | async)">
                <app-top-compradores-chart [data]="store.topCompradores$ | async">
                </app-top-compradores-chart>
            </app-chart-card>
        </div>

        <div class="grid-col span-6 span-lg-6">
            <app-chart-card title="Ranking Autorizadores"
                subtitle="Quien autoriza mas y menos"
                [loading]="!(store.rankingAutorizadores$ | async)">
                <app-ranking-autorizadores-chart [data]="store.rankingAutorizadores$ | async">
                </app-ranking-autorizadores-chart>
            </app-chart-card>
        </div>

        <!-- Tercera Fila: Productos por fecha + Saldos -->
        <div class="grid-col span-6 span-lg-6">
            <app-chart-card title="Productos Vendidos por Fecha"
                subtitle="Cantidad de productos (salidas de inventario) por dia"
                [loading]="!(store.productosPorFecha$ | async)">
                <app-productos-fecha-chart [data]="store.productosPorFecha$ | async">
                </app-productos-fecha-chart>
            </app-chart-card>
        </div>

        <div class="grid-col span-6 span-lg-6">
            <app-chart-card title="Saldos Pendientes" subtitle="Distribucion de la deuda en trabajadores"
                [loading]="!(store.personasSaldos$ | async)">
                <app-personas-distribution-chart [rawPersonas]="store.personasSaldos$ | async">
                </app-personas-distribution-chart>
            </app-chart-card>
        </div>

        <!-- Cuarta Fila: Top Inventario -->
        <div class="grid-col span-6 span-lg-6">
            <app-chart-card title="Top Salidas de Inventario" subtitle="Productos mas solicitados/entregados (Aprox)"
                [loading]="!(store.transacciones$ | async)">
                <app-inventario-top-products-chart [rawTransactions]="store.transacciones$ | async">
                </app-inventario-top-products-chart>
            </app-chart-card>
        </div>

        <!-- Quinta Fila: Historial completo -->
        <div class="grid-col span-12">
            <app-chart-card title="Historial Detallado"
                subtitle="Documento, finca, quien autorizo, quien entrego, productos del inventario"
                [loading]="!(store.historial$ | async)">
                <app-historial-table [data]="store.historial$ | async">
                </app-historial-table>
            </app-chart-card>
        </div>
    </div>
</div>
