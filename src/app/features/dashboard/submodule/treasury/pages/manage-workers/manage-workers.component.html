<div class="page-shell">
  <!-- ========= HEADER BAR ========= -->
  <header class="top-bar">
    <div class="top-bar-left">
      <div class="title-icon">
        <mat-icon>groups</mat-icon>
      </div>
      <div class="title-text">
        <h1>Gestión de Trabajadores</h1>
        <p>Administra bloqueos, estados y datos financieros de la nómina</p>
      </div>
    </div>

    <div class="top-bar-right">
      <!-- Search -->
      <div class="search-box">
        <mat-form-field appearance="outline" subscriptSizing="dynamic" class="search-input">
          <mat-icon matPrefix>search</mat-icon>
          <input matInput type="text" [(ngModel)]="searchCedula" (keyup.enter)="buscarPorCedula()"
            placeholder="Buscar por cédula...">
          @if (searchCedula()) {
          <button mat-icon-button matSuffix (click)="limpiarBusqueda()" aria-label="Limpiar">
            <mat-icon>close</mat-icon>
          </button>
          }
        </mat-form-field>
      </div>

      <!-- Stats -->
      <div class="stat-pill">
        <mat-icon>people</mat-icon>
        <div class="stat-info">
          <span class="stat-num">{{ numeroActivo() }}</span>
          <span class="stat-lbl">activos</span>
        </div>
      </div>

      <!-- Toggle inactivos -->
      <div class="toggle-inactive" (click)="$event.stopPropagation()">
        <mat-slide-toggle [checked]="showInactive()" (change)="toggleShowInactive($event)" color="primary">
          Inactivos
        </mat-slide-toggle>
      </div>

      <!-- Actions Menu -->
      <button mat-icon-button [matMenuTriggerFor]="actions" class="actions-btn" matTooltip="Más opciones">
        <mat-icon>more_vert</mat-icon>
      </button>
    </div>
  </header>

  <!-- ========= MENU ========= -->
  <mat-menu #actions="matMenu" xPosition="before">
    <button mat-menu-item (click)="resetearValores()">
      <mat-icon>refresh</mat-icon>
      <span>Resetear valores quincena</span>
    </button>
    <button mat-menu-item (click)="generarExcelDatosBase()">
      <mat-icon>download</mat-icon>
      <span>Exportar datos base (Excel)</span>
    </button>
  </mat-menu>

  <!-- ========= CONTENT ========= -->
  <div class="content">
    @if (loading()) {
    <div class="loading-state">
      <mat-spinner diameter="44"></mat-spinner>
      <span>Cargando trabajadores...</span>
    </div>
    } @else {
    <div class="table-card">
      <app-standard-filter-table [data]="rows()" [columnDefinitions]="columns" [pageSizeOptions]="[10, 20, 50, 100]"
        [defaultPageSize]="10" [tableTitle]="'Lista de Trabajadores'">

        <!-- Columna ACCIONES -->
        <ng-template appCellTemplate="acciones" let-row>
          <button mat-icon-button (click)="openEditDialog(row)" matTooltip="Editar" class="edit-action-btn">
            <mat-icon>edit</mat-icon>
          </button>
        </ng-template>

        <!-- Columna BLOQUEADO -->
        <ng-template appCellTemplate="bloqueado" let-row>
          <mat-slide-toggle [checked]="row.bloqueado" (change)="toggleEstado(row, 'bloqueado')" color="warn">
            <span class="toggle-text" [class.blocked]="row.bloqueado">{{ row.bloqueado ? 'Sí' : 'No' }}</span>
          </mat-slide-toggle>
        </ng-template>

        <!-- Columna ACTIVO -->
        <ng-template appCellTemplate="activo" let-row>
          <mat-slide-toggle [checked]="row.activo" (change)="toggleEstado(row, 'activo')" color="primary">
            <span class="toggle-text" [class.active-yes]="row.activo">{{ row.activo ? 'Sí' : 'No' }}</span>
          </mat-slide-toggle>
        </ng-template>

      </app-standard-filter-table>
    </div>
    }
  </div>
</div>
