<h2 mat-dialog-title>{{ title() }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form" (ngSubmit)="guardar()" id="rolForm">
    <mat-form-field appearance="outline" class="full">
      <mat-label>Nombre del rol</mat-label>
      <input matInput formControlName="nombre" maxlength="30" autofocus>
      <mat-error *ngIf="form.get('nombre')?.hasError('required')">El nombre es obligatorio</mat-error>
      <mat-error *ngIf="form.get('nombre')?.hasError('minlength')">Mínimo 2 caracteres</mat-error>
      <mat-error *ngIf="form.get('nombre')?.hasError('server')">El nombre ya existe</mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cancelar()">Cancelar</button>
  <button mat-flat-button color="primary" type="submit" [attr.form]="'rolForm'" [disabled]="form.invalid || saving()">
    <ng-container *ngIf="!saving(); else savingTpl">
      <mat-icon>save</mat-icon>
      Guardar
    </ng-container>
  </button>
</mat-dialog-actions>

<ng-template #savingTpl>
  <span class="saving">
    <mat-progress-spinner mode="indeterminate" diameter="18"></mat-progress-spinner>
    Guardando...
  </span>
</ng-template>
