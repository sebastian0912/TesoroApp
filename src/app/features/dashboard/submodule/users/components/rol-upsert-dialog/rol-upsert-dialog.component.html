<h2 mat-dialog-title class="dlg-header-premium">
  <mat-icon class="header-icon">manage_accounts</mat-icon>
  <span>{{ title() }}</span>
</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="form" (ngSubmit)="guardar()" id="rolForm">
    <mat-form-field appearance="outline" class="full">
      <mat-label>Nombre del rol</mat-label>
      <input matInput formControlName="nombre" maxlength="30" autofocus>
      @if (form.get('nombre')?.hasError('required')) {
        <mat-error>El nombre es obligatorio</mat-error>
      }
      @if (form.get('nombre')?.hasError('minlength')) {
        <mat-error>Mínimo 2 caracteres</mat-error>
      }
      @if (form.get('nombre')?.hasError('server')) {
        <mat-error>El nombre ya existe</mat-error>
      }
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-stroked-button (click)="cancelar()">Cancelar</button>
  <button mat-flat-button color="primary" type="submit" [attr.form]="'rolForm'" [disabled]="form.invalid || saving()">
    @if (!saving()) {
      <ng-container>
        <mat-icon>save</mat-icon>
        Guardar
      </ng-container>
    } @else {
      <ng-container>
        <span class="saving">
          <mat-progress-spinner mode="indeterminate" diameter="18"></mat-progress-spinner>
          Guardando...
        </span>
      </ng-container>
    }
  </button>
</mat-dialog-actions>
