<mat-card>
  <mat-card-header class="card-header">
    <mat-card-title class="titulo">Gestión de usuarios</mat-card-title>
    <span class="grow"></span>

    <!-- Menú 3 puntos -->
    <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Más opciones">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item (click)="openCreateDialog()">
        <mat-icon>person_add</mat-icon>
        <span>Crear usuario</span>
      </button>
    </mat-menu>
  </mat-card-header>

  <mat-card-content class="card-content">
    <!-- Loading State: Local Spinner -->
    @if (loading()) {
    <div class="table-loading-state">
      <mat-spinner diameter="48" color="primary"></mat-spinner>
      <span class="loading-text">Cargando lista de usuarios...</span>
    </div>
    } @else {
    <!-- Data Table -->
    <app-standard-filter-table [data]="rows()" [columnDefinitions]="columns" [tableTitle]="'Usuarios'"
      [pageSizeOptions]="[10, 20, 50]" [defaultPageSize]="10">

      <!-- Acciones por fila -->
      <ng-template #actionsTemplate let-row>
        <div class="actions-flex">
          <button mat-icon-button (click)="openEditDialog(row)" matTooltip="Editar usuario" class="action-btn-edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="openPermsDialog(row)" matTooltip="Gestionar permisos"
            class="action-btn-perm">
            <mat-icon>admin_panel_settings</mat-icon>
          </button>
          <button mat-icon-button (click)="deleteUser(row)" matTooltip="Eliminar" class="action-btn-delete">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </ng-template>
    </app-standard-filter-table>
    }
  </mat-card-content>
</mat-card>
