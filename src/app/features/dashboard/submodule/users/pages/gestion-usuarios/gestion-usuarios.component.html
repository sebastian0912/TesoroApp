<mat-card class="premium-card">
  <mat-card-header class="card-header-premium">
    <div class="header-content">
      <div class="header-icon-container">
        <mat-icon class="header-icon">group</mat-icon>
      </div>
      <div class="header-text">
        <mat-card-title class="titulo">Gestión de Usuarios</mat-card-title>
        <mat-card-subtitle class="subtitulo">Administración del ciclo de vida y niveles de acceso del personal
          integrado.</mat-card-subtitle>
      </div>
    </div>
    <span class="grow"></span>

    <!-- Acciones Generales -->
    <button mat-flat-button class="btn-managerial" (click)="openCreateDialog()">
      <mat-icon>person_add</mat-icon>
      <span>Nuevo Usuario</span>
    </button>
  </mat-card-header>

  <mat-card-content class="card-content">
    <!-- Loading State: Local Spinner -->
    @if (loading()) {
    <div class="table-loading-state">
      <mat-spinner diameter="48" color="primary"></mat-spinner>
      <span class="loading-text">Cargando lista de usuarios...</span>
    </div>
    } @else {
    <!-- Data Table -->
    <app-standard-filter-table [data]="rows()" [columnDefinitions]="columns" [pageSizeOptions]="[10, 20, 50]"
      [defaultPageSize]="10">

      <!-- Acciones por fila -->
      <ng-template #actionsTemplate let-row>
        <div class="actions-flex">
          <button mat-icon-button (click)="openEditDialog(row)" matTooltip="Editar usuario" class="action-btn-edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button (click)="openPermsDialog(row)" matTooltip="Gestionar permisos"
            class="action-btn-perm">
            <mat-icon>admin_panel_settings</mat-icon>
          </button>
          <button mat-icon-button (click)="deleteUser(row)" matTooltip="Eliminar" class="action-btn-delete">
            <mat-icon>delete</mat-icon>
          </button>
        </div>
      </ng-template>
    </app-standard-filter-table>
    }
  </mat-card-content>
</mat-card>
