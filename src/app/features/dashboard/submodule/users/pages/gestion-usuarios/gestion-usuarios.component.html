<mat-card>
  <mat-card-header class="card-header">
    <mat-card-title>Gestión de usuarios</mat-card-title>
    <span class="grow"></span>

    <!-- Menú 3 puntos -->
    <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Más opciones">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item (click)="openCreateDialog()">
        <mat-icon>person_add</mat-icon>
        <span>Crear usuario</span>
      </button>
    </mat-menu>
  </mat-card-header>

  <mat-card-content class="card-content">
    <!-- La tabla solo se muestra cuando los datos están listos -->
    @if (tableVisible()) {
    <app-standard-filter-table [data]="rows()" [columnDefinitions]="columns" [tableTitle]="'Usuarios'"
      [pageSizeOptions]="[10, 20, 50]" [defaultPageSize]="10">

      <!-- Acciones por fila -->
      <ng-template #actionsTemplate let-row>
        <button mat-icon-button (click)="openEditDialog(row)" aria-label="Editar">
          <mat-icon>edit</mat-icon>
        </button>
        <button mat-icon-button color="warn" (click)="deleteUser(row)" aria-label="Eliminar">
          <mat-icon>delete</mat-icon>
        </button>
        <button mat-icon-button (click)="openPermsDialog(row)" matTooltip="Ver permisos">
          <mat-icon>admin_panel_settings</mat-icon>
        </button>
      </ng-template>
    </app-standard-filter-table>
    }
  </mat-card-content>
</mat-card>
