<mat-card class="premium-card">
  <mat-card-header class="card-header-premium">
    <div class="header-content">
      <div class="header-icon-container">
        <mat-icon class="header-icon">view_module</mat-icon>
      </div>
      <div class="header-text">
        <mat-card-title class="titulo">Gestión de Módulos</mat-card-title>
        <mat-card-subtitle class="subtitulo">Configuración estructural del árbol de aplicaciones y
          navegación.</mat-card-subtitle>
      </div>
    </div>
    <span class="grow"></span>

    <!-- Crear módulo raíz -->
    <div class="header-actions">
      <button mat-flat-button class="btn-managerial" (click)="crear()">
        <mat-icon>create_new_folder</mat-icon>
        <span>Crear módulo (Raíz)</span>
      </button>
    </div>
  </mat-card-header>

  <mat-card-content class="card-content">
    <!-- Loader superior opcional -->
    <mat-progress-bar *ngIf="loading" mode="indeterminate"></mat-progress-bar>
    <div class="scroll">

      <div class="tree-container" [class.loading]="loading">
        <mat-tree #tree [dataSource]="dataSource" [childrenAccessor]="childrenAccessor">

          <!-- PADRE / EXPANDIBLE -->
          <mat-tree-node *matTreeNodeDef="let node; when: hasChild" matTreeNodePadding
            [cdkTreeNodeTypeaheadLabel]="(node.nombre || node.name)">

            <button mat-icon-button matTreeNodeToggle [attr.aria-label]="'Alternar ' + (node.nombre || node.name)">
              <mat-icon class="mat-icon-rtl-mirror">
                {{ tree.isExpanded(node) ? 'expand_more' : 'chevron_right' }}
              </mat-icon>
            </button>

            <div class="node-content" [attr.data-node-id]="node.id">
              <div class="node-text">
                <div class="node-title">{{ node.nombre || node.name }}</div>
                <div class="node-desc" *ngIf="node.descripcion">{{ node.descripcion }}</div>
              </div>

              <span class="spacer"></span>

              <div class="node-actions">
                <button mat-icon-button class="action-btn" (click)="crear(node)" matTooltip="Agregar submódulo">
                  <mat-icon>add</mat-icon>
                </button>
                <button mat-icon-button class="action-btn" (click)="editar(node)" matTooltip="Editar">
                  <mat-icon>edit_square</mat-icon>
                </button>
                <button mat-icon-button class="action-btn btn-delete" (click)="eliminar(node)" matTooltip="Eliminar">
                  <mat-icon>delete_outline</mat-icon>
                </button>
              </div>
            </div>
          </mat-tree-node>

          <!-- HOJA -->
          <mat-tree-node *matTreeNodeDef="let node" matTreeNodePadding>
            <!-- botón “espaciador” para alinear con los padres -->
            <button mat-icon-button disabled></button>

            <div class="node-content" [attr.data-node-id]="node.id">
              <div class="node-text">
                <div class="node-title">{{ node.nombre || node.name }}</div>
                <div class="node-desc" *ngIf="node.descripcion">{{ node.descripcion }}</div>
              </div>

              <span class="spacer"></span>

              <div class="node-actions">
                <button mat-icon-button class="action-btn" (click)="crear(node)" matTooltip="Agregar submódulo">
                  <mat-icon>add</mat-icon>
                </button>
                <button mat-icon-button class="action-btn" (click)="editar(node)" matTooltip="Editar">
                  <mat-icon>edit_square</mat-icon>
                </button>
                <button mat-icon-button class="action-btn btn-delete" (click)="eliminar(node)" matTooltip="Eliminar">
                  <mat-icon>delete_outline</mat-icon>
                </button>
              </div>
            </div>
          </mat-tree-node>

        </mat-tree>

        <!-- Estado vacío -->
        <div *ngIf="!loading && (!dataSource || dataSource.length === 0)" class="empty-state">
          No hay módulos todavía. Crea el primero con el botón “Crear módulo (raíz)”.
        </div>
      </div>
    </div>
  </mat-card-content>
</mat-card>
