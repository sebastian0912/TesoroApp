<mat-card class="premium-card">
  <mat-card-header class="card-header-premium">
    <div class="header-content">
      <div class="header-icon-container">
        <mat-icon class="header-icon">admin_panel_settings</mat-icon>
      </div>
      <div class="header-text">
        <mat-card-title class="titulo">Gestión de Roles</mat-card-title>
        <mat-card-subtitle class="subtitulo">Diseño de roles y mapeo estructurado de permisos de
          seguridad.</mat-card-subtitle>
      </div>
    </div>
    <span class="grow"></span>

    <!-- Acciones Generales -->
    <div class="header-actions">
      <button mat-icon-button (click)="refresh()" matTooltip="Recargar tabla" class="btn-refresh">
        <mat-icon>refresh</mat-icon>
      </button>
      <button mat-flat-button class="btn-managerial" (click)="nuevo()">
        <mat-icon>person_add</mat-icon>
        <span>Crear Rol</span>
      </button>
    </div>
  </mat-card-header>

  <mat-card-content class="card-content">
    <app-standard-filter-table [data]="roles()" [columnDefinitions]="columns()">

      <!-- Acciones por fila (con MatMenu) -->
      <ng-template #actionsTemplate let-row>
        <!-- Trigger -->
        <button mat-icon-button [matMenuTriggerFor]="rowMenu" matTooltip="Acciones" aria-label="Acciones"
          data-row-click-ignore="true" (click)="$event.stopPropagation()">
          <mat-icon>more_vert</mat-icon>
        </button>

        <!-- Menu por fila -->
        <mat-menu #rowMenu="matMenu">
          <button mat-menu-item (click)="permisos(row)">
            <mat-icon>lock</mat-icon>
            <span>Permisos</span>
          </button>

          <button mat-menu-item (click)="editar(row)">
            <mat-icon>edit</mat-icon>
            <span>Editar</span>
          </button>

          <button mat-menu-item (click)="eliminar(row)">
            <mat-icon color="warn">delete</mat-icon>
            <span>Eliminar</span>
          </button>
        </mat-menu>
      </ng-template>

    </app-standard-filter-table>
  </mat-card-content>
</mat-card>
