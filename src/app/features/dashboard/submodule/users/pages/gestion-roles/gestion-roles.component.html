<mat-card>
  <mat-card-header class="card-header">
    <mat-card-title class="titulo">Gestión de roles</mat-card-title>

    <span class="spacer"></span>

    <!-- Menú 3 puntos (acciones secundarias globales) -->
    <button mat-icon-button [matMenuTriggerFor]="menu" aria-label="Más opciones">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #menu="matMenu">
      <button mat-menu-item (click)="refresh()">
        <mat-icon>refresh</mat-icon>
        <span>Recargar</span>
      </button>
      <button mat-menu-item (click)="nuevo()">
        <mat-icon>person_add</mat-icon>
        <span>Crear usuario</span>
      </button>
    </mat-menu>
  </mat-card-header>

  <mat-card-content class="card-content">
    <app-standard-filter-table
      [data]="roles()"
      [columnDefinitions]="columns()"
      [tableTitle]="'Roles'">

      <!-- Acciones por fila (con MatMenu) -->
      <ng-template #actionsTemplate let-row>
        <!-- Trigger -->
        <button
          mat-icon-button
          [matMenuTriggerFor]="rowMenu"
          matTooltip="Acciones"
          aria-label="Acciones"
          data-row-click-ignore="true"
          (click)="$event.stopPropagation()">
          <mat-icon>more_vert</mat-icon>
        </button>

        <!-- Menu por fila -->
        <mat-menu #rowMenu="matMenu">
          <button mat-menu-item (click)="permisos(row)">
            <mat-icon>lock</mat-icon>
            <span>Permisos</span>
          </button>

          <button mat-menu-item (click)="editar(row)">
            <mat-icon>edit</mat-icon>
            <span>Editar</span>
          </button>

          <button mat-menu-item (click)="eliminar(row)">
            <mat-icon color="warn">delete</mat-icon>
            <span>Eliminar</span>
          </button>
        </mat-menu>
      </ng-template>

    </app-standard-filter-table>
  </mat-card-content>
</mat-card>
