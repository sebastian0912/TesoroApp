<mat-card>
  <mat-card-content>
    <form [formGroup]="editAdministrativoForm" (ngSubmit)="onSubmit()">
      <h1 class="titulo">Seleccione el correo a editar:</h1>

      <mat-form-field appearance="fill" class="example-full-width">
        <mat-label>Correo Electrónico</mat-label>
        <mat-select
          formControlName="correo_electronico"
          (selectionChange)="onEmailChange($event.value)"
        >
          <mat-option
            *ngFor="let user of users"
            [value]="user.correo_electronico"
          >
            {{ user.correo_electronico }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="fill" class="example-full-width">
        <mat-label>Primer Nombre</mat-label>
        <input matInput formControlName="primer_nombre" />
      </mat-form-field>

      <mat-form-field appearance="fill" class="example-full-width">
        <mat-label>Segundo Nombre</mat-label>
        <input matInput formControlName="segundo_nombre" />
      </mat-form-field>

      <mat-form-field appearance="fill" class="example-full-width">
        <mat-label>Primer Apellido</mat-label>
        <input matInput formControlName="primer_apellido" />
      </mat-form-field>

      <mat-form-field appearance="fill" class="example-full-width">
        <mat-label>Segundo Apellido</mat-label>
        <input matInput formControlName="segundo_apellido" />
      </mat-form-field>

      <mat-form-field
        appearance="fill"
        class="example-full-width password-field"
      >
        <mat-label>Nueva Contraseña</mat-label>
        <input
          matInput
          [type]="hidePassword ? 'password' : 'text'"
          formControlName="nueva_contraseña"
        />
        <button
          mat-icon-button
          matSuffix
          (click)="togglePasswordVisibility()"
          type="button"
          class="eye"
        >
          <mat-icon>{{
            hidePassword ? "visibility_off" : "visibility"
          }}</mat-icon>
        </button>
      </mat-form-field>

      <button mat-flat-button class="editar" type="submit">Editar</button>
    </form>
  </mat-card-content>
</mat-card>
