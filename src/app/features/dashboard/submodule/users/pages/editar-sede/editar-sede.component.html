<mat-card>
  <mat-card-content>
    <form [formGroup]="editSedeForm" (ngSubmit)="onSubmit()">
      <h1 class="titulo">Seleccione el usuario y la sede a trasladar:</h1>

      <mat-form-field appearance="fill" class="example-full-width">
        <mat-label>Usuario</mat-label>
        <mat-select
          formControlName="selectedUser"
          (selectionChange)="onUserChange($event.value)"
        >
          <mat-option *ngFor="let user of users" [value]="user">
            {{ user.primer_nombre }} {{ user.primer_apellido }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <mat-form-field appearance="fill" class="example-full-width">
        <mat-label>Sede</mat-label>
        <mat-select formControlName="selectedSede">
          <mat-option *ngFor="let sede of sedes" [value]="sede">
            {{ sede.nombre }}
          </mat-option>
        </mat-select>
      </mat-form-field>

      <button mat-flat-button color="primary" type="submit">Editar</button>
    </form>
  </mat-card-content>
</mat-card>
