<mat-card class="premium-card">
  <mat-card-header class="card-header-premium">
    <div class="header-content">
      <div class="header-icon-container">
        <mat-icon class="header-icon">tune</mat-icon>
      </div>
      <div class="header-text">
        <mat-card-title class="titulo">Gestión de Parametrización</mat-card-title>
        <mat-card-subtitle class="subtitulo">Generación e interacción con variables globales y metatablas
          maestras.</mat-card-subtitle>
      </div>
    </div>
    <span class="grow"></span>

    <!-- Acciones Generales -->
    <div class="header-actions">
      <button mat-icon-button (click)="descargarExcelServidor()" matTooltip="Descargar Backup Completo (Excel)"
        class="btn-refresh">
        <mat-icon>table_view</mat-icon>
      </button>
      <button mat-icon-button (click)="descargarZipServidor()" matTooltip="Descargar Backup Crudo (ZIP)"
        class="btn-refresh">
        <mat-icon>archive</mat-icon>
      </button>
      <button mat-flat-button class="btn-managerial" (click)="onNuevaTabla()">
        <mat-icon>add</mat-icon>
        <span>Nueva Tabla</span>
      </button>
    </div>
  </mat-card-header>

  <mat-card-content class="card-content">

    <app-standard-filter-table [data]="data()" [columnDefinitions]="columns" [pageSizeOptions]="pageSizeOptions"
      [defaultPageSize]="defaultPageSize" (rowClicked)="onRowClick($event)">

      <!-- ✅ Acciones por fila (con mat-menu) -->
      <ng-template #actionsTemplate let-row>
        <button mat-icon-button [matMenuTriggerFor]="rowMenu" (click)="$event.stopPropagation()" matTooltip="Acciones">
          <mat-icon>more_vert</mat-icon>
        </button>

        <mat-menu #rowMenu="matMenu">
          <button mat-menu-item (click)="$event.stopPropagation(); openMetaConfig(row, 'campos')">
            <mat-icon>view_list</mat-icon>
            <span>Configurar campos</span>
          </button>

          <button mat-menu-item (click)="$event.stopPropagation(); openMetaConfig(row, 'valores')">
            <mat-icon>dataset</mat-icon>
            <span>Gestionar valores</span>
          </button>
        </mat-menu>
      </ng-template>
    </app-standard-filter-table>
  </mat-card-content>
</mat-card>
