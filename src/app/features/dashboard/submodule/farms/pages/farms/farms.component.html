<mat-card class="premium-card">
  <mat-card-header class="card-header-premium">
    <div class="header-content">
      <div class="header-icon-container">
        <mat-icon class="header-icon">location_city</mat-icon>
      </div>
      <div class="header-text">
        <mat-card-title class="titulo">Centros de Costo</mat-card-title>
        <mat-card-subtitle class="subtitulo">Gestión de sucursales, fincas y unidades de negocio.</mat-card-subtitle>
      </div>
    </div>
    <span class="spacer grow" style="flex: 1 1 auto;"></span>

    <!-- Menú principal (3 puntos) -->
    <button mat-icon-button class="btn-managerial-icon" style="z-index: 1;" [matMenuTriggerFor]="mainMenu" aria-label="Abrir acciones">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #mainMenu="matMenu">
      <button mat-menu-item (click)="nuevo()">
        <mat-icon>add</mat-icon>
        <span>Nuevo</span>
      </button>

      <button mat-menu-item (click)="triggerImport()">
        <mat-icon>file_upload</mat-icon>
        <span>Importar Excel</span>
      </button>

      <button mat-menu-item (click)="exportar()">
        <mat-icon>file_download</mat-icon>
        <span>Exportar Excel</span>
      </button>
    </mat-menu>

    <!-- Input para importar (oculto) -->
    <input #fileInp type="file" accept=".xlsx,.xls" (change)="onImportFile($event)" hidden>
  </mat-card-header>

  <mat-card-content class="card-body">
    <app-standard-filter-table
      [data]="viewData"
      [columnDefinitions]="columns"
      [pageSizeOptions]="[10,20,50,100]"
      [defaultPageSize]="10"
      [tableTitle]="'Centros de costo'">

      <!-- Acciones por fila -->
      <ng-template #actionsTemplate let-row>
        <button mat-icon-button [matMenuTriggerFor]="rowMenu" aria-label="Acciones de fila" matTooltip="Acciones">
          <mat-icon>more_vert</mat-icon>
        </button>
        <mat-menu #rowMenu="matMenu">
          <button mat-menu-item (click)="editar(row)">
            <mat-icon>edit</mat-icon>
            <span>Editar</span>
          </button>
          <button mat-menu-item (click)="eliminar(row)">
            <mat-icon color="warn">delete</mat-icon>
            <span>Eliminar</span>
          </button>
        </mat-menu>
      </ng-template>
    </app-standard-filter-table>
  </mat-card-content>
</mat-card>
