<!-- Botón móvil (hamburguesa) -->
<button
  class="mobile-menu-btn"
  type="button"
  aria-label="Abrir menú"
  (click)="isSidebarHidden = false"
>
  <mat-icon fontSet="material-symbols-outlined">menu</mat-icon>
</button>

<aside
  class="sidebar"
  [class.show-detail]="!!activeRoot"
  [class.sidebar-hidden]="isSidebarHidden"
  (pointerenter)="cancelClose()"
  (pointerleave)="scheduleClose()"
>
  <!-- PANEL IZQUIERDO (MÓDULOS RAÍZ) -->
  <div class="left" *ngIf="!isSidebarHidden">
    <div class="module-buttons">
      <!-- HOME fijo -->
      <button
        routerLink="/dashboard"
        routerLinkActive="active-module-button"
        [routerLinkActiveOptions]="{ exact: true }"
        aria-label="Inicio"
        matTooltip="Inicio"
        matTooltipPosition="right"
        type="button"
      >
        <mat-icon class="tree-icon" fontSet="material-symbols-outlined">home</mat-icon>
      </button>

      <!-- Módulos raíz desde permisos_tree -->
      <ng-container *ngFor="let mod of rootModules; trackBy: trackByNodeId">
        <button
          type="button"
          (pointerenter)="onModuleEnter(mod)"
          (click)="onModuleEnter(mod)"
          [attr.aria-expanded]="activeRoot?.id === mod.id"
          [attr.aria-controls]="'right-panel-content'"
        >
          <mat-icon class="tree-icon" fontSet="material-symbols-outlined">
            {{ getModuleIcon(mod.nombre) }}
          </mat-icon>
        </button>
      </ng-container>
    </div>

    <div class="bottom-buttons">
      <button class="tree-icon" (click)="cerrarSesion()" title="Cerrar sesión" type="button">
        <mat-icon fontSet="material-symbols-outlined">logout</mat-icon>
      </button>
    </div>
  </div>

  <!-- PANEL DERECHO (ÁRBOL SIEMPRE EXPANDIDO) -->
  <div
    class="right"
    *ngIf="activeRoot"
    id="right-panel-content"
    (pointerenter)="onRightPanelEnter()"
    role="dialog"
    aria-modal="true"
    [attr.aria-label]="'Submódulos de ' + activeRoot.nombre"
  >
    <div class="right-inner">
      <!-- Cabecera -->
      <div class="header">
        <h2 class="header-title">{{ activeRoot.nombre }}</h2>
        <button class="header-pin-button" title="Opciones" type="button">
          <mat-icon class="header-icon" fontSet="material-symbols-outlined">more_horiz</mat-icon>
        </button>
      </div>

      <!-- Árbol SIEMPRE VISIBLE -->
      <nav class="nav-tree" [attr.aria-label]="'Submódulos de ' + activeRoot.nombre">
        <ng-container
          *ngTemplateOutlet="nodeListTpl; context: { nodes: activeRoot.hijos, depth: 0 }"
        ></ng-container>
      </nav>

      <!-- PLANTILLA RECURSIVA (SIEMPRE EXPANDIDA) -->
      <ng-template #nodeListTpl let-nodes="nodes" let-depth="depth">
        <ul class="tree-level" [class.is-root]="depth === 0">
          <li *ngFor="let node of nodes; trackBy: trackByNodeId">
            <!-- NODO PADRE -->
            <ng-container *ngIf="node.hijos?.length; else leafTpl">
              <div class="tree-item is-parent" [style.paddingLeft.px]="depth * 12">
                <div class="tree-parent-title">
                  {{ node.nombre }}
                  <span class="child-count">({{ node.hijos.length }})</span>
                </div>
              </div>

              <ng-container
                *ngTemplateOutlet="nodeListTpl; context: { nodes: node.hijos, depth: depth + 1 }"
              ></ng-container>
            </ng-container>

            <!-- NODO HOJA -->
            <ng-template #leafTpl>
              <div class="tree-item is-leaf" [style.paddingLeft.px]="depth * 12">
                <mat-icon class="tree-icon" fontSet="material-symbols-outlined">
                  {{ getNodeIcon(node.nombre) }}
                </mat-icon>

                <a
                  class="tree-link leaf"
                  [routerLink]="getNodeRoute(node)"
                  routerLinkActive="active-submodule"
                  (click)="onLeafClick()"
                >
                  {{ node.nombre }}
                </a>
              </div>
            </ng-template>
          </li>
        </ul>
      </ng-template>
    </div>
  </div>

  <!-- Backdrop dentro del aside para overlay móvil -->
  <div
    class="sidebar-backdrop"
    *ngIf="!isSidebarHidden && activeRoot"
    (click)="isSidebarHidden = true; activeRoot = null"
    aria-hidden="true"
  ></div>
</aside>
