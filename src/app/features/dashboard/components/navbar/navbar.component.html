<aside class="sidebar" [class.show-detail]="!!activeRoot" [class.sidebar-hidden]="isSidebarHidden">
  <!-- PANEL IZQUIERDO (MÓDULOS RAÍZ) -->
  <div class="left" (mouseleave)="onPanelLeave()" *ngIf="!isSidebarHidden">
    <div class="module-buttons">
      <!-- HOME fijo -->
      <button
        routerLink="/dashboard"
        routerLinkActive="active-module-button"
        [routerLinkActiveOptions]="{ exact: true }"
        aria-label="Inicio"
        matTooltip="Inicio"
        matTooltipPosition="right"
        type="button">
        <mat-icon class="tree-icon" fontSet="material-symbols-outlined">home</mat-icon>
      </button>

      <!-- Módulos raíz desde permisos_tree -->
      <ng-container *ngFor="let mod of rootModules; trackBy: trackByNodeId">
        <button
          type="button"
          (mouseenter)="onModuleEnter(mod)"
          [matTooltip]="mod.nombre"
          matTooltipPosition="right"
          [attr.aria-expanded]="activeRoot?.id === mod.id">
          <mat-icon class="tree-icon" fontSet="material-symbols-outlined">
            {{ getModuleIcon(mod.nombre) }}
          </mat-icon>
        </button>
      </ng-container>
    </div>

    <div class="bottom-buttons">
      <button class="tree-icon" (click)="cerrarSesion()" title="Cerrar sesión" type="button">
        <mat-icon fontSet="material-symbols-outlined">logout</mat-icon>
      </button>
    </div>
  </div>

  <!-- PANEL DERECHO (ÁRBOL RECURSIVO) -->
  <div
    class="right"
    *ngIf="activeRoot"
    id="right-panel-content"
    (mouseenter)="onRightPanelEnter()"
    (mouseleave)="onPanelLeave()">

    <div class="right-inner">
      <!-- Cabecera -->
      <div class="header">
        <h2 class="header-title">{{ activeRoot.nombre }}</h2>
        <button class="header-pin-button" title="Expandir/Colapsar todo" (click)="toggleAll(activeRoot)" type="button">
          <mat-icon class="header-icon" fontSet="material-symbols-outlined">
            {{ isAnyCollapsed(activeRoot) ? 'unfold_more' : 'unfold_less' }}
          </mat-icon>
        </button>
      </div>

      <!-- Árbol -->
      <nav class="nav-tree" [attr.aria-label]="'Submódulos de ' + activeRoot.nombre">
        <ng-container *ngTemplateOutlet="nodeListTpl; context: { nodes: activeRoot.hijos, depth: 0 }"></ng-container>
      </nav>

      <!-- plantilla recursiva -->
      <ng-template #nodeListTpl let-nodes="nodes" let-depth="depth">
        <ul class="tree-level" [class.is-root]="depth === 0">
          <li *ngFor="let node of nodes; trackBy: trackByNodeId">
            <!--
              NODOS HOJA alineados a la DERECHA:
              - class.is-leaf para CSS
              - paddingLeft solo si tiene hijos
              - paddingRight solo si es hoja
            -->
            <div
              class="tree-item"
              [class.is-leaf]="!node.hijos?.length"
              [style.paddingLeft.px]="node.hijos?.length ? depth * 16 : 0"
              [style.paddingRight.px]="!node.hijos?.length ? depth * 16 : 0">

              <!-- Toggle solo si tiene hijos -->
              <button
                *ngIf="node.hijos?.length"
                class="toggle-btn"
                type="button"
                (click)="toggleNode(node.id)"
                [attr.aria-expanded]="isExpanded(node.id)">
                <mat-icon fontSet="material-symbols-outlined">
                  {{ isExpanded(node.id) ? 'expand_more' : 'chevron_right' }}
                </mat-icon>
              </button>

              <!-- Icono del nodo -->
              <mat-icon class="tree-icon" fontSet="material-symbols-outlined">
                {{ getNodeIcon(node.nombre) }}
              </mat-icon>

              <!-- Si es hoja, navega; si no, expande/colapsa -->
              <a
                *ngIf="!node.hijos?.length; else expandableTitle"
                class="tree-link"
                [routerLink]="getNodeRoute(node)"
                routerLinkActive="active-submodule"
                (click)="activeRoot = null">
                {{ node.nombre }}
              </a>

              <ng-template #expandableTitle>
                <button class="tree-link as-button" type="button" (click)="toggleNode(node.id)">
                  {{ node.nombre }}
                </button>
              </ng-template>
            </div>

            <!-- hijos -->
            <ng-container *ngIf="node.hijos?.length && isExpanded(node.id)">
              <ng-container
                *ngTemplateOutlet="nodeListTpl; context: { nodes: node.hijos, depth: depth + 1 }">
              </ng-container>
            </ng-container>
          </li>
        </ul>
      </ng-template>
    </div>
  </div>
</aside>
