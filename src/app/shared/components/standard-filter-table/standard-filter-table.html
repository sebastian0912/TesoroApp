<div class="table-container">
  <div class="paginator-row">
    <button mat-flat-button class="clear-filters-btn" (click)="clearFilters()">
      <mat-icon fontIcon="filter_alt_off"></mat-icon>
      Limpiar filtros
    </button>

    <span class="grow"></span>

    <!-- Export menú -->
    <button mat-icon-button [matMenuTriggerFor]="exportMenu" aria-label="Opciones de exportación"
      class="export-menu-btn">
      <mat-icon>more_vert</mat-icon>
    </button>
    <mat-menu #exportMenu="matMenu">
      <button mat-menu-item (click)="exportTable('pdf')">
        <mat-icon>picture_as_pdf</mat-icon>
        <span>Exportar PDF</span>
      </button>
      <button mat-menu-item (click)="exportTable('xml')">
        <mat-icon>code</mat-icon>
        <span>Exportar XML</span>
      </button>
      <button mat-menu-item (click)="exportTable('excel')">
        <mat-icon>table_view</mat-icon>
        <span>Exportar Excel</span>
      </button>
    </mat-menu>

    <mat-paginator [pageSizeOptions]="[10, 20, 50]" [pageSize]="10" showFirstLastButtons aria-label="Paginador de tabla"
      class="table-paginator">
    </mat-paginator>
  </div>

  <!-- Superficie de tabla -->
  <mat-table ngSkipHydration [dataSource]="dataSource" matSort class="table--compact">

    <!-- Anchos de columnas controlados por colgroup -->
    <colgroup>
      <col *ngFor="let col of columnDefinitions" [style.width]="col.width || null" [style.minWidth]="col.width || null"
        [style.maxWidth]="col.width || null">
    </colgroup>

    <!-- Columnas dinámicas -->
    <ng-container *ngFor="let col of columnDefinitions; trackBy: trackByCol" [matColumnDef]="col.name">
      <mat-header-cell *matHeaderCellDef mat-sort-header [matTooltip]="col.header" matTooltipShowDelay="600">
        {{ col.header }}
      </mat-header-cell>

      <mat-cell *matCellDef="let row" [class.cell-right]="col.type === 'number'"
        [class.cell-ellipsis]="col.type === 'text' || col.type === 'custom' || col.type === 'status'"
        [matTooltip]="col.type === 'date' ? (row[col.name] | date:'dd-MM-yyyy HH:mm') : row[col.name]"
        matTooltipShowDelay="600">

        <!-- acciones / adjuntos / contenido -->
        <ng-container *ngIf="col.name === 'actions' && actionsTemplate">
          <ng-container *ngTemplateOutlet="actionsTemplate; context: {$implicit: row}"></ng-container>
        </ng-container>

        <ng-container *ngIf="col.name === 'attachment' && attachmentTemplate">
          <ng-container *ngTemplateOutlet="attachmentTemplate; context: {$implicit: row}"></ng-container>
        </ng-container>

        <ng-container *ngIf="col.name !== 'actions' && col.name !== 'attachment'">
          <ng-container [ngSwitch]="col.type">
            <span *ngSwitchDefault>{{ row[col.name] }}</span>
            <span *ngSwitchCase="'date'">{{ row[col.name] | date:'dd-MM-yyyy HH:mm' }}</span>
            <span *ngSwitchCase="'status'" class="status-chip"
              [style.color]="getStatusConfig(col.name)[row[col.name]]?.color"
              [style.backgroundColor]="getStatusConfig(col.name)[row[col.name]]?.background">
              {{ row[col.name] }}
            </span>
            <span *ngSwitchCase="'custom'" class="custom-chip"
              [style.color]="getCustomClassConfig(col.name)[row[col.name]]?.color"
              [style.backgroundColor]="getCustomClassConfig(col.name)[row[col.name]]?.background">
              {{ row[col.name] }}
            </span>
          </ng-container>
        </ng-container>
      </mat-cell>
    </ng-container>

    <!-- Fila de filtros (usa el mismo colgroup, así que hereda anchos) -->
    <ng-container *ngFor="let col of columnDefinitions; trackBy: trackByCol" [matColumnDef]="col.name + '_filter'">
      <mat-header-cell *matHeaderCellDef class="filter-cell">
        <!-- Input -->
        <mat-form-field *ngIf="(col.type === 'text' || col.type === 'number') && filterControls[col.name]"
          appearance="outline" class="filter-ff">
          <input matInput [type]="col.type" [placeholder]="col.header" [formControl]="filterControls[col.name]" />
        </mat-form-field>

        <!-- Select (select y status) -->
        <mat-form-field *ngIf="(col.type === 'select' || col.type === 'status') && filterControls[col.name]"
          appearance="outline" class="filter-ff">
          <mat-select placeholder="Opción" [formControl]="filterControls[col.name]" multiple>
            <mat-option *ngFor="let option of (col.options || yesNoOptions)" [value]="option">
              {{ option }}
            </mat-option>
          </mat-select>
        </mat-form-field>


        <!-- Rango fechas -->
        <mat-form-field *ngIf="col.type === 'date'" appearance="outline" class="filter-ff">
          <mat-date-range-input [formGroup]="dateRange" [rangePicker]="pickerRange" class="date-range-input">
            <input matStartDate formControlName="start" placeholder="Desde" />
            <input matEndDate formControlName="end" placeholder="Hasta" />
          </mat-date-range-input>
          <mat-datepicker-toggle matSuffix [for]="pickerRange"></mat-datepicker-toggle>
          <mat-date-range-picker #pickerRange></mat-date-range-picker>
        </mat-form-field>
      </mat-header-cell>
    </ng-container>

    <!-- Filas -->
    <mat-header-row *matHeaderRowDef="displayedColumns; sticky: true" class="header-row-main"></mat-header-row>
    <mat-header-row *matHeaderRowDef="displayedFilterColumns; sticky: true" class="header-row-filters"></mat-header-row>
    <mat-row *matRowDef="let row; columns: displayedColumns;" class="data-row" tabindex="0"></mat-row>

    <!-- Sin datos -->
    <tr mat-row *matNoDataRow class="no-data">
      <td class="mat-mdc-cell" [attr.colspan]="displayedColumns.length || 1">No hay registros</td>
    </tr>
  </mat-table>

</div>
